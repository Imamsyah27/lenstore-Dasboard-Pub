<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENSTORE Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.logo-title{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#e8e8e8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.title h1{
    font-size:28px;
}

.title p{
    color:#666;
}

.stats{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#fafafa;
    padding:15px;
    border-radius:12px;
    border:1px solid #ececec;
}

.card h3{
    font-size:14px;
    color:#666;
}

.card span{
    display:block;
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.search{
    flex:1;
}

.search input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.add-btn{
    background:#16a34a;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.table-wrapper{
    background:white;
    border-radius:15px;
    overflow:auto;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f3f4f6;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-top:1px solid #eee;
}

.action-btn{
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.wa-btn{
    background:#25D366;
    color:white;
}

.copy-btn{
    background:#3b82f6;
    color:white;
}

.send-btn{
    background:#16a34a;
    color:white;
}

.edit-btn{
    background:#f59e0b;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

.status-active{
    color:#16a34a;
    font-weight:bold;
}

.status-warning{
    color:#f59e0b;
    font-weight:bold;
}

.status-finished{
    color:#666;
    font-weight:bold;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:95%;
    max-width:500px;
    padding:20px;
    border-radius:15px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.modal-buttons{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.modal-buttons button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo-title">
<div class="logo">LOGO</div>

<div class="title">
<h1>LENSTORE</h1>
<p>Customer Management Dashboard</p>
</div>
</div>

<div class="stats">

<div class="card">
<h3>Customer Aktif</h3>
<span id="activeCount">0</span>
</div>

<div class="card">
<h3>Sudah Dikirim Hari Ini</h3>
<span id="sentToday">0</span>
</div>

<div class="card">
<h3>Belum Dikirim Hari Ini</h3>
<span id="notSentToday">0</span>
</div>

<div class="card">
<h3>Reset 00:00 WIB</h3>
<span id="countdown">--:--:--</span>
</div>

</div>
</div>

<div class="toolbar">

<div class="search">
<input
type="text"
id="searchInput"
placeholder="Cari customer...">
</div>

<button
class="add-btn"
id="openModal">
+ Tambah Customer
</button>

</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>WhatsApp</th>
<th>Tagar</th>
<th>Paket</th>
<th>Progress</th>
<th>Sisa</th>
<th>Status</th>
<th>Hari Ini</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="customerTable">

<!-- DATA CUSTOMER -->

</tbody>

</table>

</div>

</div>

<!-- Modal -->

<div class="modal" id="customerModal">

<div class="modal-content">

<h2>Tambah Customer</h2>

<input
type="text"
id="customerName"
placeholder="Nama Customer">

<input
type="text"
id="customerWa"
placeholder="628xxxxxxxxxx">

<input
type="text"
id="customerTagar"
placeholder="#hayday #farm">

<input
type="number"
id="customerDays"
placeholder="Jumlah Hari">

<div class="modal-buttons">

<button id="closeModal">
Batal
</button>

<button
class="add-btn"
id="saveCustomer">
Simpan
</button>

</div>

</div>

</div>

<script>
<script>

let customers =
JSON.parse(localStorage.getItem("customers")) || [];

let editingId = null;

const customerTable =
document.getElementById("customerTable");

const modal =
document.getElementById("customerModal");

const openModalBtn =
document.getElementById("openModal");

const closeModalBtn =
document.getElementById("closeModal");

const saveBtn =
document.getElementById("saveCustomer");

const searchInput =
document.getElementById("searchInput");

openModalBtn.onclick = () => {
    modal.style.display = "flex";
};

closeModalBtn.onclick = () => {
    modal.style.display = "none";
    clearForm();
};

window.onclick = (e) => {
    if (e.target === modal) {
        modal.style.display = "none";
        clearForm();
    }
};

function clearForm() {
    editingId = null;

    document.getElementById("customerName").value = "";
    document.getElementById("customerWa").value = "";
    document.getElementById("customerTagar").value = "";
    document.getElementById("customerDays").value = "";
}

function saveData() {
    localStorage.setItem(
        "customers",
        JSON.stringify(customers)
    );
}

function generateId() {

    if (customers.length === 0) {
        return "CUST-001";
    }

    let last =
    customers[customers.length - 1].id;

    let number =
    parseInt(last.replace("CUST-",""));

    number++;

    return `CUST-${String(number).padStart(3,"0")}`;
}

saveBtn.onclick = () => {

    const nama =
    document.getElementById("customerName")
    .value.trim();

    const wa =
    document.getElementById("customerWa")
    .value.trim();

    const tagar =
    document.getElementById("customerTagar")
    .value.trim();

    const hari =
    parseInt(
        document.getElementById("customerDays")
        .value
    );

    if (
        !nama ||
        !wa ||
        !tagar ||
        !hari
    ) {
        alert("Lengkapi semua data");
        return;
    }

    if (editingId) {

        const index =
        customers.findIndex(
            c => c.id === editingId
        );

        customers[index].nama = nama;
        customers[index].wa = wa;
        customers[index].tagar = tagar;
        customers[index].paketHari = hari;

    } else {

        customers.push({
            id: generateId(),
            nama,
            wa,
            tagar,
            paketHari: hari,
            progress: 0,
            createdAt:
            new Date().toLocaleDateString(
                "id-ID"
            )
        });
    }

    saveData();
    renderTable();

    modal.style.display = "none";
    clearForm();
};

function getStatus(customer){

    let sisa =
    customer.paketHari -
    customer.progress;

    if (sisa <= 0)
        return "Selesai";

    if (sisa <= 3)
        return "Hampir Habis";

    return "Aktif";
}

function renderTable(){

    let keyword =
    searchInput.value.toLowerCase();

    customerTable.innerHTML = "";

    let filtered =
    customers.filter(c =>

        c.nama.toLowerCase()
        .includes(keyword)

        ||

        c.wa.toLowerCase()
        .includes(keyword)

        ||

        c.tagar.toLowerCase()
        .includes(keyword)

    );

    filtered.forEach(customer => {

        let sisa =
        customer.paketHari -
        customer.progress;

        let status =
        getStatus(customer);

        let statusClass =
        "status-active";

        if(status==="Hampir Habis"){
            statusClass =
            "status-warning";
        }

        if(status==="Selesai"){
            statusClass =
            "status-finished";
        }

        customerTable.innerHTML += `
        <tr>

            <td>${customer.id}</td>

            <td>${customer.nama}</td>

            <td>
                <button
                class="action-btn wa-btn"
                onclick="openWA('${customer.wa}')">
                Chat
                </button>
            </td>

            <td>
                <button
                class="action-btn copy-btn"
                onclick="copyTagar(\`${customer.tagar}\`)">
                Copy
                </button>
            </td>

            <td>
                ${customer.paketHari} Hari
            </td>

            <td>
                ${customer.progress}/${customer.paketHari}
            </td>

            <td>
                ${sisa}
            </td>

            <td class="${statusClass}">
                ${status}
            </td>

            <td>
                -
            </td>

            <td>

                <button
                class="action-btn edit-btn"
                onclick="editCustomer('${customer.id}')">
                Edit
                </button>

                <button
                class="action-btn delete-btn"
                onclick="deleteCustomer('${customer.id}')">
                Hapus
                </button>

            </td>

        </tr>
        `;
    });

    updateStats();
}

function updateStats(){

    let aktif =
    customers.filter(c =>
    c.paketHari - c.progress > 0
    ).length;

    document.getElementById(
    "activeCount"
    ).innerText = aktif;

    document.getElementById(
    "sentToday"
    ).innerText = "-";

    document.getElementById(
    "notSentToday"
    ).innerText = "-";
}

function editCustomer(id){

    let customer =
    customers.find(
        c => c.id === id
    );

    editingId = id;

    document.getElementById(
    "customerName"
    ).value = customer.nama;

    document.getElementById(
    "customerWa"
    ).value = customer.wa;

    document.getElementById(
    "customerTagar"
    ).value = customer.tagar;

    document.getElementById(
    "customerDays"
    ).value = customer.paketHari;

    modal.style.display = "flex";
}

function deleteCustomer(id){

    if(
        !confirm(
            "Hapus customer ini?"
        )
    ) return;

    customers =
    customers.filter(
        c => c.id !== id
    );

    saveData();
    renderTable();
}

function openWA(wa){

    window.open(
        `https://wa.me/${wa}`,
        "_blank"
    );
}

function copyTagar(tagar){

    navigator.clipboard
    .writeText(tagar);

    alert(
        "Tagar berhasil disalin"
    );
}

searchInput.addEventListener(
"input",
renderTable
);

renderTable();

</script>
</script>

</body>
</html>
